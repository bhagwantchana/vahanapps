# ============================================================================
# Codemagic CI — builds the iOS app on a cloud Mac and uploads it to TestFlight,
# so you can ship iOS WITHOUT owning a Mac. Drive it from any machine (Windows).
#
# ONE-TIME SETUP in the Codemagic web UI (https://codemagic.io):
#   1. Sign up (free), connect the Git repo that holds this fleet_monitor project
#      (push it to a PRIVATE GitHub/GitLab/Bitbucket repo first).
#   2. Team settings → Integrations → "App Store Connect": add an API key.
#      (App Store Connect → Users and Access → Integrations → App Store Connect
#       API → generate a key with "App Manager" role; download the .p8, note the
#       Key ID + Issuer ID, paste into Codemagic.) Give the key a NAME, then put
#       that exact name below at:  app_store_connect: <YOUR_KEY_NAME>
#   3. In App Store Connect → My Apps → "+" → create the app with bundle id
#      com.globynix.fleetMonitor. Copy its numeric "Apple ID" → set APP_STORE_APPLE_ID below.
#   4. (Push/sound) Upload the APNs Auth Key (.p8) to the Firebase project in the
#      Firebase console — this is the still-pending step for iOS notifications.
#
# Then: open the workflow in Codemagic and press "Start new build". Codemagic
# fetches the signing profile automatically (no manual certificates needed).
# ============================================================================
workflows:
  ios-testflight:
    name: Fleet Monitor — iOS → TestFlight
    max_build_duration: 90
    instance_type: mac_mini_m2
    integrations:
      # NAME of the App Store Connect API key as it appears in Codemagic UI
      # (Settings → Developer Portal → Manage keys). The connected key for
      # Key ID CCG3PRF2WV is named "Codemagic", so reference that exact name.
      app_store_connect: Codemagic
    environment:
      groups:
        # Add CERTIFICATE_PRIVATE_KEY (a PEM RSA private key, marked Secure) to
        # this group in the Codemagic UI. It persists the signing cert's private
        # key across builds so fetch-signing-files reuses ONE distribution
        # certificate instead of failing with "Cannot save Signing Certificates
        # without certificate private key" on each fresh CI machine.
        - appstore_credentials
      # NOTE: deliberately NO `ios_signing:` block here. That managed block only
      # FETCHES already-uploaded signing files and runs in Codemagic's prepare
      # phase — on a brand-new app it finds nothing and fails with
      # "No matching profiles found". We create the cert + profile explicitly in
      # the scripts below (fetch-signing-files --create) instead.
      vars:
        # the numeric "Apple ID" of the app from App Store Connect (App Information)
        APP_STORE_APPLE_ID: 6768335248
        BUNDLE_ID: "com.globynix.fleetMonitor"
      # PINNED to the exact local version that builds cleanly. Do NOT use
      # "stable": Codemagic's stable moved to a newer Flutter where IconData
      # became a `final class`, which breaks lucide_icons 0.257.0
      # ("IconData can't be extended ... it's a final class"). 3.41.9 still has
      # a non-final IconData, so the app compiles exactly like it does locally.
      flutter: 3.41.9
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up code signing — CREATE the distribution cert + App Store profile if missing
        script: |
          # The app_store_connect integration auto-supplies the API credentials.
          # --create makes Codemagic generate the iOS Distribution certificate AND
          # the App Store provisioning profile via the API when they don't exist
          # yet (first build). No Mac and no manual Developer-portal steps needed.
          keychain initialize
          # --certificate-key reuses a persisted private key (from the
          # CERTIFICATE_PRIVATE_KEY secure env var) so the distribution cert is
          # stable across builds instead of being recreated keyless every time.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Install CocoaPods dependencies (the iOS equivalent of gradle deps)
        script: |
          # Scope to ios/ ONLY. A repo-wide `find -name Podfile` would also hit
          # macos/Podfile, which has no Flutter-macOS config on CI and would
          # raise ("Generated.xcconfig must exist"), failing the whole build.
          cd ios && pod install
      - name: Apply signing profiles to the Xcode project (manual signing)
        script: |
          # MUST run AFTER pod install and right before the build. It switches
          # the Runner target from Automatic to MANUAL signing using the App
          # Store profile fetched above. This is what fixes the archive error:
          #   "No Accounts" / "couldn't find any iOS App Development provisioning
          #    profiles" — that means the archive was still using AUTOMATIC
          #    signing, which needs a logged-in Apple account (none on CI).
          xcode-project use-profiles
      - name: Build signed IPA (auto-increment the TestFlight build number)
        script: |
          # Next build number = latest TestFlight build + 1 (or 1 on the very first build).
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo 0)
          NEXT=$(( ${LATEST:-0} + 1 ))
          flutter build ipa --release \
            --build-number=$NEXT \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true            # uploads to TestFlight automatically
        # To auto-submit to App Store review instead, add: submit_to_app_store: true
